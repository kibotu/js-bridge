disabled_rules:
  - trailing_whitespace
  - nesting
  - todo

included:
  - JSBridge/Sources
  - BridgeSample

excluded:
  - build
  - .build
  - swiftlint-report.xml

function_body_length:
  - 50

opt_in_rules:
  - force_unwrapping
  - force_try
  - force_cast
  - closure_end_indentation
  - direct_return
  - discouraged_object_literal
  - empty_collection_literal
  - empty_string
  - empty_xctest_method
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - implicit_return
  - implicitly_unwrapped_optional
  - last_where
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - number_separator
  - redundant_nil_coalescing
  # requires ios 14.3
  # - redundant_self_in_closure
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - vertical_whitespace_between_cases
  - vertical_parameter_alignment_on_call

force_unwrapping: error
force_try: error
force_cast: error

line_length:
  warning: 160

identifier_name:
  min_length: 2
  max_length: 60

type_name:
  min_length: 2
  max_length: 60

custom_rules:
  todo_without_ticket_number:
    included: ".*.swift"
    name: "todo without ticket number"
    regex: '(\/\/[^\n0-9]*(?<!\([a-zA-Z]\-[0-9]\))(t|T)(o|O)(d|D)(o|O)|\/\*[^0-9]*(?<!\([a-zA-Z]\-[0-9]\))(t|T)(o|O)(d|D)(o|O).*\s*\*\/)'
    match_kinds:
      - comment
    message: "Every TODO should have a ticket number assigned so that we dont forget about it"
    severity: warning
